<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SL Neo-TV Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --neon: #00f2ff;
            --accent: #bc13fe;
            --bg: #050505;
            --glass: rgba(20, 20, 20, 0.85);
        }

        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; overflow: hidden; 
        }

        /* FONDO DE VIDEO */
        #main-display {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* INTERFAZ SUPERPUESTA */
        #ui-layer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            z-index: 2; pointer-events: none; /* No bloquea el click al video si no hay menú */
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 20px;
        }

        /* BUSCADOR ESTILO FUTURISTA */
        #search-container {
            pointer-events: auto; width: 60%; margin-bottom: 15px;
            background: var(--glass); border: 1px solid var(--neon);
            border-radius: 50px; padding: 10px 20px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            display: flex; align-items: center;
        }
        #search-input {
            background: transparent; border: none; color: white; width: 100%;
            outline: none; font-size: 16px; text-align: center;
        }

        /* GRILLA DE CANALES */
        #channel-grid {
            pointer-events: auto; width: 90%; max-height: 40vh;
            background: var(--glass); border-radius: 15px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px; padding: 15px; overflow-y: auto;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        /* BOTONES DE CANAL */
        .channel-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 10px; text-align: center;
            cursor: pointer; transition: 0.3s; height: 60px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .channel-card:hover {
            background: var(--neon); color: #000;
            box-shadow: 0 0 20px var(--neon);
            transform: translateY(-5px);
        }
        .channel-card span { font-size: 11px; font-weight: bold; text-transform: uppercase; }

        /* CATEGORÍAS LATERALES */
        #cat-bar {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            z-index: 3; pointer-events: auto; display: flex; flex-direction: column; gap: 10px;
        }
        .cat-btn {
            background: var(--glass); border: 1px solid var(--accent);
            color: white; padding: 10px; border-radius: 10px; cursor: pointer;
            writing-mode: vertical-lr; text-orientation: mixed; font-size: 12px;
            transition: 0.3s;
        }
        .cat-btn:hover { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* NOTIFICACIÓN */
        #status {
            position: absolute; top: 20px; right: 20px; font-size: 12px;
            background: var(--glass); padding: 5px 15px; border-radius: 20px;
            border: 1px solid var(--neon); color: var(--neon); z-index: 4;
        }

        /* SCROLLBAR CUSTOM */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="status">SISTEMA ONLINE</div>

    <div id="main-display">
        <video id="video" poster="https://i.imgur.com/8N8y6R2.jpg" autoplay></video>
    </div>

    <div id="cat-bar">
        <div class="cat-btn" onclick="loadByCountry('MX')">MEXICO</div>
        <div class="cat-btn" onclick="loadByCountry('ES')">ESPAÑA</div>
        <div class="cat-btn" onclick="loadByCountry('AR')">ARGENTINA</div>
        <div class="cat-btn" onclick="loadByCountry('US')">USA</div>
    </div>

    <div id="ui-layer">
        <div id="search-container">
            <input type="text" id="search-input" placeholder="ESCRIBE EL NOMBRE DE UN CANAL...">
        </div>
        
        <div id="channel-grid">
            <!-- Los canales se cargan aquí -->
            <div style="grid-column: 1/-1; text-align:center; padding:20px;">
                BIENVENIDO AL SISTEMA. CARGANDO CANALES TOP...
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const grid = document.getElementById('channel-grid');
        const searchInput = document.getElementById('search-input');
        const status = document.getElementById('status');
        let hls = new Hls();
        let allStreams = [];

        // 1. CARGAR DATOS INICIALES
        async function init() {
            try {
                status.innerText = "CONECTANDO API...";
                const res = await fetch('https://iptv-org.github.io/api/streams.json');
                allStreams = await res.json();
                status.innerText = "SISTEMA LISTO";
                loadSample();
            } catch (e) {
                status.innerText = "ERROR DE CONEXIÓN";
            }
        }

        // 2. BUSCADOR
        searchInput.oninput = () => {
            const query = searchInput.value.toLowerCase();
            if (query.length < 3) return;
            const results = allStreams.filter(s => s.channel && s.channel.toLowerCase().includes(query)).slice(0, 50);
            render(results);
        };

        // 3. CARGAR POR PAÍS (Botones laterales)
        async function loadByCountry(code) {
            status.innerText = `BUSCANDO: ${code}...`;
            // Filtramos la lista gigante por país
            const results = allStreams.filter(s => s.channel && s.channel.toLowerCase().includes(`(${code.toLowerCase()})`) || (s.url.includes(`/${code.toLowerCase()}.m3u`))).slice(0, 60);
            
            // Si la búsqueda simple falla, pedimos la lista oficial del país
            fetch(`https://iptv-org.github.io/iptv/countries/${code.toLowerCase()}.m3u`)
                .then(res => res.text())
                .then(data => parseM3U(data));
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const list = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].split(',')[1] || "CANAL";
                    list.push({ channel: name, url: lines[i+1] });
                }
            }
            render(list.slice(0, 100));
        }

        // 4. DIBUJAR GRILLA
        function render(list) {
            grid.innerHTML = "";
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `<span>${item.channel.replace('.us', '').replace('.mx', '').toUpperCase()}</span>`;
                card.onclick = () => play(item.url);
                grid.appendChild(card);
            });
            status.innerText = `${list.length} CANALES CARGADOS`;
        }

        function loadSample() {
            const sample = allStreams.sort(() => 0.5 - Math.random()).slice(0, 20);
            render(sample);
        }

        // 5. REPRODUCTOR
        function play(url) {
            status.innerText = "SINTONIZANDO...";
            let streamUrl = url.replace('http://', 'https://');

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    status.innerText = "EN VIVO";
                });
            }
        }

        init();
    </script>
</body>
</html>
