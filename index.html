<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SL Cinema Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --accent: #ff9d00; /* Ámbar Pro */
            --bg-dark: #0a0a0a;
            --panel-bg: #151515;
            --text-dim: #888;
        }

        body { 
            margin: 0; background: var(--bg-dark); color: #fff; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* --- COLUMNA IZQUIERDA (CONTROL) --- */
        #sidebar {
            width: 300px;
            background: var(--panel-bg);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        #brand { padding: 20px; border-bottom: 1px solid #222; }
        #brand h1 { margin: 0; font-size: 18px; color: var(--accent); letter-spacing: 2px; }
        #brand span { font-size: 10px; color: var(--text-dim); }

        #search-container { padding: 15px; }
        #search-input {
            width: 100%; background: #000; border: 1px solid #333;
            color: #fff; padding: 10px; border-radius: 4px; box-sizing: border-box;
            outline: none; border-left: 3px solid var(--accent);
        }

        #channel-list {
            flex-grow: 1; overflow-y: auto; padding: 10px;
        }

        .channel-row {
            padding: 12px; margin-bottom: 5px; background: #1a1a1a;
            border-radius: 4px; cursor: pointer; display: flex; align-items: center;
            font-size: 12px; transition: 0.2s; border-left: 0px solid var(--accent);
        }
        .channel-row:hover { background: #222; border-left: 4px solid var(--accent); color: var(--accent); }

        /* --- ÁREA DERECHA (DISPLAY) --- */
        #display-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #000;
        }

        #video-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center; justify-content: center;
            overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Overlay Técnico */
        #tech-info {
            position: absolute; top: 20px; right: 20px;
            text-align: right; pointer-events: none;
        }
        .stat { font-family: monospace; font-size: 11px; color: var(--accent); margin-bottom: 5px; }

        #footer-info {
            height: 40px; background: var(--panel-bg); border-top: 1px solid #222;
            display: flex; align-items: center; padding: 0 20px;
            font-size: 11px; color: var(--text-dim); gap: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

    <!-- CONTROL SIDEBAR -->
    <div id="sidebar">
        <div id="brand">
            <h1>CINEMA PRO</h1>
            <span>BROADCAST CONTROL UNIT</span>
        </div>

        <div id="search-container">
            <input type="text" id="search-input" placeholder="BUSCAR CANAL O PAÍS...">
        </div>

        <div id="channel-list">
            <div style="padding:20px; color:#555; text-align:center;">INICIALIZANDO SISTEMA...</div>
        </div>
    </div>

    <!-- MAIN DISPLAY -->
    <div id="display-area">
        <div id="tech-info">
            <div class="stat" id="clock">00:00:00</div>
            <div class="stat">SIGNAL: <span id="sig-status" style="color:#fff">STANDBY</span></div>
            <div class="stat">DECODER: HLS.JS/v1.0</div>
        </div>

        <div id="video-wrapper">
            <video id="video" autoplay></video>
        </div>

        <div id="footer-info">
            <span id="current-name">SELECCIONE UNA FUENTE DE VIDEO</span>
            <span id="current-url" style="opacity: 0.4;">---</span>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const channelList = document.getElementById('channel-list');
        const searchInput = document.getElementById('search-input');
        const sigStatus = document.getElementById('sig-status');
        const currentName = document.getElementById('current-name');
        const currentUrlText = document.getElementById('current-url');
        
        let hls = new Hls();
        let allStreams = [];

        // 1. CARGA DE API
        async function init() {
            try {
                const res = await fetch('https://iptv-org.github.io/api/streams.json');
                allStreams = await res.json();
                renderList(allStreams.sort(() => 0.5 - Math.random()).slice(0, 50));
            } catch (e) {
                channelList.innerHTML = "ERROR DE CARGA";
            }
        }

        // 2. BUSCADOR
        searchInput.oninput = () => {
            const q = searchInput.value.toLowerCase();
            if (q.length < 2) return;
            const res = allStreams.filter(s => s.channel && s.channel.toLowerCase().includes(q)).slice(0, 100);
            renderList(res);
        };

        // 3. RENDERIZAR FILAS
        function renderList(list) {
            channelList.innerHTML = "";
            list.forEach(item => {
                const row = document.createElement('div');
                row.className = 'channel-row';
                row.innerHTML = `▸ ${item.channel.toUpperCase()}`;
                row.onclick = () => play(item.url, item.channel);
                channelList.appendChild(row);
            });
        }

        // 4. REPRODUCCIÓN
        function play(url, name) {
            sigStatus.innerText = "CONNECTING...";
            sigStatus.style.color = "orange";
            currentName.innerText = name.toUpperCase();
            currentUrlText.innerText = url;

            let streamUrl = url.replace('http://', 'https://');

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    sigStatus.innerText = "LIVE";
                    sigStatus.style.color = "#00ff00";
                });
                hls.on(Hls.Events.ERROR, () => {
                    sigStatus.innerText = "OFFLINE";
                    sigStatus.style.color = "red";
                });
            }
        }

        // RECOLOJ
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);

        init();
    </script>
</body>
</html>
