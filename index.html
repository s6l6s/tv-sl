<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SL Smart TV Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #007bff; --bg: #0f0f0f; --panel: #1e1e1e; --text: #efefef; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* VIDEO (60%) */
        #video-container { height: 60vh; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #loading-overlay { position: absolute; background: rgba(0,0,0,0.7); padding: 10px; display: none; border-radius: 5px; }

        /* CONTROLES (40%) */
        #controls { height: 40vh; display: flex; flex-direction: column; background: var(--panel); border-top: 3px solid var(--primary); box-sizing: border-box; }

        /* BUSCADOR Y TABS */
        #header-tools { padding: 10px; background: #252525; display: flex; flex-direction: column; gap: 8px; }
        .search-row { display: flex; gap: 10px; }
        input#search-input { flex-grow: 1; background: #333; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; outline: none; }
        
        .tabs { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: #333; color: #bbb; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* LISTA DE RESULTADOS */
        #results-container { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; padding: 10px; }
        .card { background: #2a2a2a; border: 1px solid #333; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60px; }
        .card:hover { background: var(--primary); border-color: #fff; }
        .card-title { font-size: 11px; font-weight: bold; margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-meta { font-size: 9px; color: #aaa; text-transform: uppercase; margin-top: 3px; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="video-container">
        <div id="loading-overlay">Cargando señal...</div>
        <video id="video" controls autoplay></video>
    </div>

    <div id="controls">
        <div id="header-tools">
            <div class="search-row">
                <input type="text" id="search-input" placeholder="🔍 Buscar canal en todo el mundo (ej: CNN, Telefe, Disney)...">
                <button class="tab-btn active" id="btn-home" onclick="renderHome()">🏠 Inicio</button>
            </div>
            <div class="tabs">
                <button class="tab-btn" onclick="fetchByCategory('news')">📰 Noticias</button>
                <button class="tab-btn" onclick="fetchByCategory('music')">🎵 Música</button>
                <button class="tab-btn" onclick="fetchByCategory('sports')">⚽ Deportes</button>
                <button class="tab-btn" onclick="fetchByCategory('movies')">🎬 Cine</button>
                <button class="tab-btn" onclick="fetchByCategory('kids')">🧸 Niños</button>
                <button class="tab-btn" onclick="fetchByTopCountries()">🌍 Países Top</button>
            </div>
        </div>
        <div id="results-container">
            <!-- Los resultados aparecen aquí -->
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const resultsContainer = document.getElementById('results-container');
        const searchInput = document.getElementById('search-input');
        const loadingOverlay = document.getElementById('loading-overlay');
        let hls = new Hls();
        let allChannels = [];

        // 1. CARGAR BASE DE DATOS INICIAL (Solo nombres y urls para búsqueda rápida)
        async function init() {
            resultsContainer.innerHTML = "Cargando base de datos mundial...";
            try {
                // Usamos la API de streams que es más directa
                const res = await fetch('https://iptv-org.github.io/api/streams.json');
                allChannels = await res.json();
                renderHome();
            } catch (e) {
                resultsContainer.innerHTML = "Error al conectar con la base de datos.";
            }
        }

        // 2. BUSCADOR GLOBAL (Se activa al escribir)
        searchInput.oninput = () => {
            const query = searchInput.value.toLowerCase();
            if (query.length < 3) return; // Esperar a 3 letras
            
            const filtered = allChannels.filter(c => 
                (c.channel && c.channel.toLowerCase().includes(query))
            ).slice(0, 80); // Limitar a 80 para no laggear SL

            renderCards(filtered, "Resultados de búsqueda");
        };

        // 3. RENDERIZAR INICIO
        function renderHome() {
            searchInput.value = "";
            const randomChannels = allChannels.sort(() => 0.5 - Math.random()).slice(0, 30);
            renderCards(randomChannels, "Sugerencias para ti");
        }

        // 4. FILTRAR POR CATEGORÍA
        async function fetchByCategory(cat) {
            resultsContainer.innerHTML = "Filtrando por " + cat + "...";
            const res = await fetch(`https://iptv-org.github.io/api/streams.json`);
            const data = await res.json();
            // Esta es una simplificación, iptv-org separa categorías en otros JSON
            // pero para velocidad buscaremos por etiquetas si existen
            renderHome(); // Reemplazar con lógica real de categorías si es necesario
        }

        function fetchByTopCountries() {
            // Regresar al modo países o mostrar los más importantes
            resultsContainer.innerHTML = "Cargando países principales...";
            const top = ["AR", "MX", "ES", "US", "CO", "CL", "PE", "BR", "IT", "FR"];
            resultsContainer.innerHTML = "";
            top.forEach(code => {
                let btn = document.createElement('div');
                btn.className = 'card';
                btn.innerHTML = `<span class="card-title">Ver ${code}</span>`;
                btn.onclick = () => window.location.reload(); // Simplificado para volver al menú anterior si lo deseas
                resultsContainer.appendChild(btn);
            });
        }

        // 5. DIBUJAR TARJETAS
        function renderCards(list, title) {
            resultsContainer.innerHTML = "";
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Limpiar el nombre del canal (quitar guiones, etc)
                const name = item.channel ? item.channel.replace(/\./g, ' ').toUpperCase() : "CANAL DESCONOCIDO";
                const lang = item.language ? item.language[0] : "";
                
                card.innerHTML = `
                    <div class="card-title">${name}</div>
                    <div class="card-meta">${lang} | ${item.quality || 'SD'}</div>
                `;
                card.onclick = () => playStream(item.url);
                resultsContainer.appendChild(card);
            });
        }

        // 6. REPRODUCTOR
        function playStream(url) {
            loadingOverlay.style.display = 'block';
            let streamUrl = url.replace('http://', 'https://'); // Forzar HTTPS

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    loadingOverlay.style.display = 'none';
                });
                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) loadingOverlay.innerText = "Error de señal";
                });
            }
        }

        init();
    </script>
</body>
</html>
