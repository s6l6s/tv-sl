<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Pro Player</title>
    
    <!-- Anti-Caché Script Nivel 1 -->
    <script>
        // Fuerza la recarga si detecta que es una versión vieja en memoria
        if (location.href.indexOf('?v=') == -1) {
            location.replace(location.href + '?v=' + Date.now());
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #0a0b0d;
            --sidebar: #14171c;
            --accent: #3d5afe;
            --text: #ffffff;
            --text-dim: #70778b;
        }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; 
            display: grid; grid-template-columns: 280px 1fr; 
            height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR IZQUIERDO (Categorías y Países) --- */
        #sidebar {
            background: var(--sidebar);
            border-right: 1px solid #232834;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .search-container { padding: 20px; }
        #main-search {
            width: 100%; background: #1e222d; border: 1px solid #2d3446;
            color: white; padding: 12px; border-radius: 8px; box-sizing: border-box;
            outline: none; font-size: 14px;
        }

        .nav-tabs {
            display: flex; border-bottom: 1px solid #232834;
        }
        .tab {
            flex: 1; padding: 15px; text-align: center; cursor: pointer;
            font-size: 12px; font-weight: bold; color: var(--text-dim);
            transition: 0.3s;
        }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: #1a1f2b; }

        #list-explorer {
            flex: 1; overflow-y: auto; padding: 10px;
        }
        .list-item {
            padding: 12px 15px; margin-bottom: 4px; border-radius: 6px;
            cursor: pointer; font-size: 13px; color: #a0a6b5;
            display: flex; align-items: center; gap: 10px;
        }
        .list-item:hover { background: #1e222d; color: white; }
        .list-item.selected { background: var(--accent); color: white; }

        /* --- ÁREA PRINCIPAL (Video y Grilla) --- */
        #main-view {
            display: grid; grid-template-rows: 1fr 250px;
            background: #000;
        }

        #video-viewport {
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        #channel-grid {
            background: var(--bg);
            border-top: 1px solid #232834;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px; padding: 20px; overflow-y: auto;
        }

        .channel-card {
            background: #14171c; border: 1px solid #232834;
            padding: 15px; border-radius: 10px; cursor: pointer;
            text-align: center; transition: 0.2s;
        }
        .channel-card:hover { border-color: var(--accent); transform: translateY(-3px); background: #1c212c; }
        .channel-card .name { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; }
        .channel-card .lang { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

        /* OSD Info */
        #osd {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.8); padding: 10px 20px;
            border-radius: 8px; border-left: 4px solid var(--accent);
            pointer-events: none;
        }
        #osd h3 { margin: 0; font-size: 14px; }
        #osd p { margin: 5px 0 0; font-size: 11px; color: var(--accent); font-weight: bold; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2d3446; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="search-container">
            <input type="text" id="main-search" placeholder="Buscar país o categoría...">
        </div>
        
        <div class="nav-tabs">
            <div class="tab active" onclick="switchTab('countries')">PAÍSES</div>
            <div class="tab" onclick="switchTab('categories')">GÉNEROS</div>
        </div>

        <div id="list-explorer">
            <!-- Cargando dinámicamente -->
        </div>
    </div>

    <div id="main-view">
        <div id="video-viewport">
            <div id="osd">
                <h3 id="now-playing">SISTEMA LISTO</h3>
                <p id="status-text">ESPERANDO SELECCIÓN</p>
            </div>
            <video id="video" autoplay controls></video>
        </div>

        <div id="channel-grid">
            <!-- Canales aquí -->
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const listExplorer = document.getElementById('list-explorer');
        const channelGrid = document.getElementById('channel-grid');
        const searchInput = document.getElementById('main-search');
        
        let hls = new Hls();
        let currentTab = 'countries';
        let fullData = { countries: [], categories: [] };

        // 1. INICIO: Carga de API con prevención de caché en la URL
        async function init() {
            const ts = Date.now();
            try {
                const [resC, resG] = await Promise.all([
                    fetch(`https://iptv-org.github.io/api/countries.json?cb=${ts}`).then(r => r.json()),
                    fetch(`https://iptv-org.github.io/api/categories.json?cb=${ts}`).then(r => r.json())
                ]);
                fullData.countries = resC.filter(i => i.name).sort((a,b) => a.name.localeCompare(b.name));
                fullData.categories = resG.filter(i => i.name).sort((a,b) => a.name.localeCompare(b.name));
                renderExplorer();
            } catch (e) {
                listExplorer.innerHTML = "Error de conexión.";
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderExplorer();
        }

        function renderExplorer(filter = "") {
            listExplorer.innerHTML = "";
            const data = fullData[currentTab];
            data.forEach(item => {
                if (item.name.toLowerCase().includes(filter.toLowerCase())) {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `<span>${item.flag || '•'}</span> ${item.name}`;
                    div.onclick = () => loadChannels(item.code || item.id, item.name);
                    listExplorer.appendChild(div);
                }
            });
        }

        async function loadChannels(id, name) {
            channelGrid.innerHTML = "<p style='padding:20px'>Sintonizando canales de " + name + "...</p>";
            const type = currentTab === 'countries' ? 'countries' : 'categories';
            try {
                const res = await fetch(`https://iptv-org.github.io/iptv/${type}/${id.toLowerCase()}.m3u`);
                const text = await res.text();
                parseM3U(text);
            } catch (e) {
                channelGrid.innerHTML = "No hay canales disponibles para esta selección.";
            }
        }

        function parseM3U(data) {
            channelGrid.innerHTML = "";
            const lines = data.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].split(',')[1] || "Canal";
                    const url = lines[i+1];
                    if (url && url.startsWith('http')) {
                        const card = document.createElement('div');
                        card.className = 'channel-card';
                        card.innerHTML = `<span class="name">${name}</span><span class="lang">HLS LIVE</span>`;
                        card.onclick = () => play(url, name);
                        channelGrid.appendChild(card);
                    }
                }
            }
        }

        function play(url, name) {
            document.getElementById('now-playing').innerText = name.toUpperCase();
            document.getElementById('status-text').innerText = "CONECTANDO...";
            
            const streamUrl = url.replace('http://', 'https://');

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    document.getElementById('status-text').innerText = "EN VIVO";
                });
                hls.on(Hls.Events.ERROR, () => {
                    document.getElementById('status-text').innerText = "ERROR DE SEÑAL";
                });
            }
        }

        searchInput.oninput = () => renderExplorer(searchInput.value);

        init();
    </script>
</body>
</html>
