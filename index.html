<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SL World TV Pro - Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #121212; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #video-container { height: 65vh; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; }
        #controls { height: 35vh; display: flex; flex-direction: column; background: #1e1e1e; border-top: 4px solid #007bff; padding: 10px; box-sizing: border-box; }
        #nav-bar { display: flex; gap: 10px; margin-bottom: 10px; }
        input#search-box { flex-grow: 1; background: #333; border: 1px solid #555; color: white; padding: 5px 10px; border-radius: 4px; }
        button.back-btn { background: #d9534f; color: white; border: none; padding: 0 15px; cursor: pointer; border-radius: 4px; font-weight: bold; display: none; }
        #list-container { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 5px; }
        .item-btn { background: #2a2a2a; color: #ddd; border: 1px solid #333; padding: 8px; cursor: pointer; text-align: left; font-size: 11px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-btn:hover { background: #007bff; color: white; }
        #error-msg { position: absolute; top: 10px; background: rgba(255,0,0,0.8); padding: 5px; display: none; font-size: 12px; }
    </style>
</head>
<body>

    <div id="video-container">
        <div id="error-msg">Error: La señal no es compatible o está bloqueada.</div>
        <video id="video" controls autoplay></video>
    </div>

    <div id="controls">
        <div id="nav-bar">
            <button id="btn-back" class="back-btn" onclick="renderPaises()">⬅ Volver</button>
            <input type="text" id="search-box" placeholder="🔍 Buscar país..." onkeyup="filtrarPaises()">
        </div>
        <div id="list-container"> Cargando... </div>
    </div>

    <script>
        var video = document.getElementById('video');
        var listContainer = document.getElementById('list-container');
        var btnBack = document.getElementById('btn-back');
        var searchBox = document.getElementById('search-box');
        var errorMsg = document.getElementById('error-msg');
        var hls = new Hls();

        let todosLosPaises = []; 

        fetch('https://iptv-org.github.io/api/countries.json')
            .then(res => res.json())
            .then(data => {
                todosLosPaises = data.filter(p => p.name && p.code).sort((a, b) => a.name.localeCompare(b.name));
                renderPaises();
            });

        function renderPaises(filtro = "") {
            listContainer.innerHTML = "";
            btnBack.style.display = "none";
            searchBox.style.display = "block";
            searchBox.value = filtro;
            todosLosPaises.forEach(pais => {
                if (pais.name.toLowerCase().includes(filtro.toLowerCase())) {
                    let btn = document.createElement('button');
                    btn.className = 'item-btn';
                    btn.innerHTML = `<span>${pais.flag || '🏳️'}</span> ${pais.name}`;
                    btn.onclick = () => cargarCanales(pais.code, pais.name);
                    listContainer.appendChild(btn);
                }
            });
        }

        function filtrarPaises() { renderPaises(searchBox.value); }

        function cargarCanales(code, nombrePais) {
            listContainer.innerHTML = "Cargando...";
            btnBack.style.display = "block";
            searchBox.style.display = "none";
            fetch(`https://iptv-org.github.io/iptv/countries/${code.toLowerCase()}.m3u`)
                .then(res => res.text())
                .then(data => parsearM3U(data));
        }

        function parsearM3U(data) {
            listContainer.innerHTML = "";
            const lineas = data.split('\n');
            for (let i = 0; i < lineas.length; i++) {
                if (lineas[i].startsWith('#EXTINF')) {
                    let nombre = lineas[i].split(',').slice(1).join(',').trim();
                    let urlVideo = lineas[i+1];
                    if (urlVideo && urlVideo.startsWith('http')) {
                        let btn = document.createElement('button');
                        btn.className = 'item-btn';
                        btn.innerText = "📺 " + nombre;
                        btn.onclick = () => reproducir(urlVideo.trim());
                        listContainer.appendChild(btn);
                    }
                }
            }
        }

        function reproducir(source) {
            errorMsg.style.display = 'none';
            // Intentamos convertir http a https automáticamente
            let streamUrl = source.replace('http://', 'https://');
            
            if (Hls.isSupported()) {
                hls.destroy(); // Limpiar instancia anterior
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) errorMsg.style.display = 'block';
                });
            }
        }
    </script>
</body>
</html>
