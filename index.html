<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SL Cinema OS - Pro</title>
    
    <!-- ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --accent: #ff9d00;
            --bg: #050505;
            --panel: #111;
            --hover: #1a1a1a;
            --text: #eee;
        }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* --- BARRA LATERAL (TODO SUCEDE AQUÍ) --- */
        #sidebar {
            width: 320px;
            background: var(--panel);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        /* CABECERA Y BUSCADOR */
        #side-header { padding: 20px; border-bottom: 1px solid #222; }
        .nav-top { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        #back-btn { 
            cursor: pointer; font-size: 20px; color: var(--accent); 
            display: none; /* Oculto por defecto */
        }
        #side-title { margin: 0; font-size: 16px; font-weight: bold; text-transform: uppercase; }

        #search-box { position: relative; }
        #search-input {
            width: 100%; background: #000; border: 1px solid #333;
            color: #fff; padding: 10px; border-radius: 5px; box-sizing: border-box;
            outline: none; font-size: 13px;
        }

        /* PESTAÑAS */
        #tabs { display: flex; border-bottom: 1px solid #222; }
        .tab { 
            flex: 1; padding: 12px; text-align: center; cursor: pointer; 
            font-size: 12px; font-weight: bold; color: #666; transition: 0.2s;
        }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: #151515; }

        /* LISTA DINÁMICA */
        #main-list { flex: 1; overflow-y: auto; padding: 10px; }
        .list-item {
            padding: 12px 15px; margin-bottom: 4px; border-radius: 6px;
            cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.02); transition: 0.2s;
        }
        .list-item:hover { background: var(--hover); color: var(--accent); }
        .list-item.channel { border-left: 2px solid #333; }
        .list-item.channel:hover { border-left-color: var(--accent); }

        /* --- ÁREA DE VIDEO --- */
        #video-area { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        #osd {
            position: absolute; bottom: 30px; left: 30px;
            background: rgba(0,0,0,0.8); padding: 15px 25px;
            border-left: 5px solid var(--accent); pointer-events: none;
            z-index: 10;
        }
        #osd h3 { margin: 0; font-size: 18px; letter-spacing: 1px; }
        #osd p { margin: 5px 0 0; font-size: 12px; color: var(--accent); font-weight: bold; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="side-header">
            <div class="nav-top">
                <span id="back-btn" onclick="goBack()">⬅</span>
                <h1 id="side-title">PAÍSES</h1>
            </div>
            <div id="search-box">
                <input type="text" id="search-input" placeholder="Buscar...">
            </div>
        </div>

        <div id="tabs">
            <div class="tab active" id="tab-countries" onclick="switchMode('countries')">PAÍSES</div>
            <div class="tab" id="tab-channels" onclick="switchMode('channels')">CANALES</div>
        </div>

        <div id="main-list">
            <!-- Contenido dinámico -->
        </div>
    </div>

    <div id="video-area">
        <div id="osd">
            <h3 id="current-channel">SISTEMA LISTO</h3>
            <p id="current-status">ESPERANDO SELECCIÓN</p>
        </div>
        <video id="video" autoplay controls></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const mainList = document.getElementById('main-list');
        const sideTitle = document.getElementById('side-title');
        const backBtn = document.getElementById('back-btn');
        const searchInput = document.getElementById('search-input');
        const tabs = document.getElementById('tabs');
        
        let hls = new Hls();
        let currentMode = 'countries'; // 'countries', 'channels', 'country-detail'
        let dataStore = { countries: [], allChannels: [] };
        let lastCountryList = "";

        // 1. INICIALIZACIÓN
        async function init() {
            const ts = Date.now();
            // Cargar países
            const resC = await fetch(`https://iptv-org.github.io/api/countries.json?v=${ts}`);
            dataStore.countries = (await resC.json()).filter(c => c.name).sort((a,b) => a.name.localeCompare(b.name));
            
            // Cargar una muestra de canales globales para la pestaña "Canales"
            const resS = await fetch(`https://iptv-org.github.io/api/streams.json?v=${ts}`);
            dataStore.allChannels = await resS.json();

            renderCountries();
        }

        // 2. CAMBIAR ENTRE PESTAÑAS (PAISES / CANALES)
        function switchMode(mode) {
            currentMode = mode;
            searchInput.value = "";
            backBtn.style.display = "none";
            tabs.style.display = "flex";
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');

            if(mode === 'countries') renderCountries();
            else renderGlobalChannels();
        }

        // 3. RENDERIZAR PAÍSES
        function renderCountries(filter = "") {
            currentMode = 'countries';
            sideTitle.innerText = "PAÍSES";
            mainList.innerHTML = "";
            dataStore.countries.forEach(c => {
                if(c.name.toLowerCase().includes(filter.toLowerCase())) {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `<span>${c.flag || '🏳️'}</span> ${c.name}`;
                    div.onclick = () => loadCountryChannels(c.code, c.name);
                    mainList.appendChild(div);
                }
            });
        }

        // 4. RENDERIZAR CANALES DE UN PAÍS ESPECÍFICO
        async function loadCountryChannels(code, name) {
            currentMode = 'country-detail';
            sideTitle.innerText = name;
            backBtn.style.display = "block";
            tabs.style.display = "none"; // Ocultar pestañas al estar dentro de un país
            mainList.innerHTML = "Cargando canales...";
            searchInput.value = "";

            try {
                const res = await fetch(`https://iptv-org.github.io/iptv/countries/${code.toLowerCase()}.m3u`);
                const text = await res.text();
                const lines = text.split('\n');
                mainList.innerHTML = "";
                
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const cName = lines[i].split(',')[1] || "Canal";
                        const url = lines[i+1];
                        if(url && url.startsWith('http')) {
                            const div = document.createElement('div');
                            div.className = 'list-item channel';
                            div.innerHTML = `▸ ${cName}`;
                            div.onclick = () => play(url, cName);
                            mainList.appendChild(div);
                        }
                    }
                }
            } catch (e) {
                mainList.innerHTML = "Error al cargar canales.";
            }
        }

        // 5. RENDERIZAR CANALES GLOBALES (Pestaña Canales)
        function renderGlobalChannels(filter = "") {
            sideTitle.innerText = "CANALES";
            mainList.innerHTML = "";
            
            // Si no hay filtro, mostrar una muestra aleatoria para no colapsar
            const list = filter.length > 2 
                ? dataStore.allChannels.filter(c => c.channel && c.channel.toLowerCase().includes(filter.toLowerCase())).slice(0, 100)
                : dataStore.allChannels.slice(0, 50);

            list.forEach(c => {
                const div = document.createElement('div');
                div.className = 'list-item channel';
                div.innerHTML = `🌐 ${c.channel.toUpperCase()}`;
                div.onclick = () => play(c.url, c.channel);
                mainList.appendChild(div);
            });
        }

        // 6. VOLVER ATRÁS
        function goBack() {
            switchMode('countries');
        }

        // 7. REPRODUCTOR
        function play(url, name) {
            document.getElementById('current-channel').innerText = name.toUpperCase();
            document.getElementById('current-status').innerText = "CONECTANDO...";
            
            const sUrl = url.replace('http://', 'https://');

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(sUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    document.getElementById('current-status').innerText = "EN VIVO";
                });
                hls.on(Hls.Events.ERROR, () => {
                    document.getElementById('current-status').innerText = "SEÑAL OFFLINE";
                });
            }
        }

        // 8. BUSCADOR INTELIGENTE
        searchInput.oninput = () => {
            const val = searchInput.value;
            if (currentMode === 'countries') renderCountries(val);
            else if (currentMode === 'channels') renderGlobalChannels(val);
            else {
                // Filtrar canales dentro de la lista de un país ya cargada
                const items = mainList.getElementsByClassName('list-item');
                Array.from(items).forEach(item => {
                    item.style.display = item.innerText.toLowerCase().includes(val.toLowerCase()) ? "flex" : "none";
                });
            }
        };

        init();
    </script>
</body>
</html>
