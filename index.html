<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SL Cinema OS - Ultimate</title>
    
    <!-- ANTI-CACHE AGRESIVO -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --accent: #ff9d00;
            --bg: #050505;
            --panel: #111;
            --hover: #1a1a1a;
            --text: #eee;
        }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* --- BARRA LATERAL --- */
        #sidebar {
            width: 320px;
            background: var(--panel);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            z-index: 20;
        }

        #side-header { padding: 20px; border-bottom: 1px solid #222; }
        .nav-top { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        #back-btn { cursor: pointer; font-size: 20px; color: var(--accent); display: none; }
        #side-title { margin: 0; font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        #search-input {
            width: 100%; background: #000; border: 1px solid #333;
            color: #fff; padding: 10px; border-radius: 5px; box-sizing: border-box;
            outline: none; font-size: 13px;
        }

        #tabs { display: flex; border-bottom: 1px solid #222; background: #0a0a0a; }
        .tab { 
            flex: 1; padding: 12px; text-align: center; cursor: pointer; 
            font-size: 11px; font-weight: bold; color: #555; transition: 0.2s;
        }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: #111; }

        #main-list { flex: 1; overflow-y: auto; padding: 10px; background: #0d0d0d; }
        .list-item {
            padding: 10px 15px; margin-bottom: 3px; border-radius: 4px;
            cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.02); transition: 0.1s;
            border-left: 2px solid transparent;
        }
        .list-item:hover { background: var(--hover); color: var(--accent); border-left-color: var(--accent); }
        .list-item span { color: var(--accent); font-weight: bold; font-family: monospace; }

        /* --- ÁREA DE VIDEO --- */
        #video-area { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        #osd {
            position: absolute; bottom: 30px; left: 30px;
            background: rgba(0,0,0,0.85); padding: 15px 25px;
            border-left: 5px solid var(--accent); pointer-events: none;
            z-index: 10;
        }
        #osd h3 { margin: 0; font-size: 18px; letter-spacing: 1px; text-transform: uppercase; }
        #osd p { margin: 5px 0 0; font-size: 11px; color: var(--accent); font-weight: bold; letter-spacing: 2px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="side-header">
            <div class="nav-top">
                <span id="back-btn" onclick="goBack()">⬅</span>
                <h1 id="side-title">Cargando...</h1>
            </div>
            <input type="text" id="search-input" placeholder="Buscar en la lista...">
        </div>

        <div id="tabs">
            <div class="tab active" id="tab-countries" onclick="switchMode('countries')">PAÍSES</div>
            <div class="tab" id="tab-channels" onclick="switchMode('channels')">CANALES</div>
        </div>

        <div id="main-list">
            <div style="text-align:center; padding-top:50px; color: #444;">Iniciando base de datos...</div>
        </div>
    </div>

    <div id="video-area">
        <div id="osd">
            <h3 id="current-channel">SISTEMA LISTO</h3>
            <p id="current-status">ONLINE</p>
        </div>
        <video id="video" autoplay controls></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const mainList = document.getElementById('main-list');
        const sideTitle = document.getElementById('side-title');
        const backBtn = document.getElementById('back-btn');
        const searchInput = document.getElementById('search-input');
        const tabs = document.getElementById('tabs');
        
        let hls = new Hls();
        let currentMode = 'countries'; 
        let dataStore = { countries: [], allChannels: [] };

        // 1. CARGA INICIAL
        async function init() {
            const ts = Date.now();
            try {
                // Cargar Países
                const resC = await fetch(`https://iptv-org.github.io/api/countries.json?v=${ts}`);
                dataStore.countries = (await resC.json()).filter(c => c.name).sort((a,b) => a.name.localeCompare(b.name));
                
                // Cargar TODOS los canales (Streams)
                const resS = await fetch(`https://iptv-org.github.io/api/streams.json?v=${ts}`);
                const streams = await resS.json();
                
                // Limpiar y Ordenar Alfabéticamente por el ID del canal o URL
                dataStore.allChannels = streams
                    .filter(s => s.channel)
                    .sort((a, b) => a.channel.localeCompare(b.channel));

                switchMode('countries');
            } catch (e) {
                mainList.innerHTML = "Error al conectar con la API.";
            }
        }

        // 2. CAMBIAR PESTAÑAS
        function switchMode(mode) {
            currentMode = mode;
            searchInput.value = "";
            backBtn.style.display = "none";
            tabs.style.display = "flex";
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');

            if(mode === 'countries') renderCountries();
            else renderAllChannels();
        }

        // 3. RENDER PAÍSES
        function renderCountries(filter = "") {
            sideTitle.innerText = "PAÍSES";
            mainList.innerHTML = "";
            dataStore.countries.forEach(c => {
                if(c.name.toLowerCase().includes(filter.toLowerCase())) {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `<span>${c.flag || '🏳️'}</span> ${c.name}`;
                    div.onclick = () => loadCountryChannels(c.code, c.name);
                    mainList.appendChild(div);
                }
            });
        }

        // 4. RENDER TODOS LOS CANALES (ALFABÉTICO)
        function renderAllChannels(filter = "") {
            sideTitle.innerText = "CANALES (A-Z)";
            mainList.innerHTML = "";
            
            const filtered = filter.length > 0 
                ? dataStore.allChannels.filter(c => c.channel.toLowerCase().includes(filter.toLowerCase()))
                : dataStore.allChannels;

            // Renderizado optimizado para 10,000 items
            const fragment = document.createDocumentFragment();
            const limit = filter.length > 0 ? filtered.length : 500; // Mostrar 500 al inicio si no hay búsqueda para evitar lag

            for (let i = 0; i < Math.min(filtered.length, limit); i++) {
                const c = filtered[i];
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>▸</span> ${c.channel.replace(/\-/g, ' ').toUpperCase()}`;
                div.onclick = () => play(c.url, c.channel);
                fragment.appendChild(div);
            }
            mainList.appendChild(fragment);
            
            if(filtered.length > limit && filter.length === 0) {
                const note = document.createElement('div');
                note.style = "padding: 10px; font-size: 10px; color: #444; text-align: center;";
                note.innerText = "Usa el buscador para filtrar entre los +10,000 canales...";
                mainList.appendChild(note);
            }
        }

        // 5. CARGAR CANALES DE UN PAÍS
        async function loadCountryChannels(code, name) {
            currentMode = 'country-detail';
            sideTitle.innerText = name;
            backBtn.style.display = "block";
            tabs.style.display = "none";
            mainList.innerHTML = "Cargando...";

            try {
                const res = await fetch(`https://iptv-org.github.io/iptv/countries/${code.toLowerCase()}.m3u`);
                const text = await res.text();
                const lines = text.split('\n');
                mainList.innerHTML = "";
                
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const cName = lines[i].split(',')[1] || "Canal";
                        const url = lines[i+1];
                        if(url && url.startsWith('http')) {
                            const div = document.createElement('div');
                            div.className = 'list-item';
                            div.innerHTML = `<span>▸</span> ${cName.toUpperCase()}`;
                            div.onclick = () => play(url, cName);
                            mainList.appendChild(div);
                        }
                    }
                }
            } catch (e) {
                mainList.innerHTML = "Error al cargar canales.";
            }
        }

        // 6. VOLVER
        function goBack() {
            switchMode('countries');
        }

        // 7. REPRODUCTOR
        function play(url, name) {
            document.getElementById('current-channel').innerText = name.replace(/\-/g, ' ').toUpperCase();
            document.getElementById('current-status').innerText = "CONECTANDO...";
            
            const sUrl = url.replace('http://', 'https://');

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(sUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    document.getElementById('current-status').innerText = "EN VIVO";
                });
                hls.on(Hls.Events.ERROR, () => {
                    document.getElementById('current-status').innerText = "OFFLINE";
                });
            }
        }

        // 8. BUSCADOR
        searchInput.oninput = () => {
            const val = searchInput.value;
            if (currentMode === 'countries') renderCountries(val);
            else if (currentMode === 'channels') renderAllChannels(val);
            else {
                const items = mainList.getElementsByClassName('list-item');
                Array.from(items).forEach(item => {
                    item.style.display = item.innerText.toLowerCase().includes(val.toLowerCase()) ? "flex" : "none";
                });
            }
        };

        init();
    </script>
</body>
</html>
